name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  # ── Python backend tests ────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: apipool_test
          POSTGRES_PASSWORD: apipool_test
          POSTGRES_DB: apipool_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U apipool_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-server.txt
          pip install -r requirements-test.txt

      - name: Run lint check
        run: pip install ruff && ruff check apipool_server/ apipool/

      - name: Run tests (SQLite)
        env:
          DATABASE_URL: sqlite:///./test_apipool.db
          APIPOOL_ENCRYPTION_KEY: ""
          JWT_SECRET_KEY: "ci-test-secret-key"
          APIPOOL_ADMIN_USERNAME: "admin"
          APIPOOL_ADMIN_PASSWORD: "admin123456"
          APIPOOL_ADMIN_EMAIL: "admin@test.ci"
          DEBUG: "false"
          CORS_ORIGINS: "http://localhost:3000"
        run: pytest tests/ -v --tb=short

  # ── Frontend build check ───────────────────────────────────────────
  test-frontend:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apipool_server/frontend/package-lock.json

      - name: Install & build frontend
        working-directory: apipool_server/frontend
        run: npm ci && npx vue-tsc --noEmit && npx vite build

  # ── Docker build verification ──────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t apipool-test .

  # ── Security scan (optional) ──────────────────────────────────────
  security-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install safety
        run: pip install safety

      - name: Python dependency scan
        run: safety check -r requirements-server.txt || true
